<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Vibe Check Project</title>
    <style>
        /* Basic reset */
        body, html {
            height: 100%;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            background-color: #000;
            overflow: hidden; /* Hide overflow during splash */
        }

        /* Video background style for main content */
        #background-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            object-fit: cover; 
        }

        /* Splash screen styles with video background */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            transition: opacity 0.5s ease-in-out;
        }

        #splash-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Video as splash screen background */
        #splash-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* Enter button that animates in */
        .enter-prompt {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2em;
            padding: 15px 40px;
            background-color: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            opacity: 0;
            animation: slideInUp 0.8s ease-out 2s forwards;
        }

        .enter-prompt:hover {
            background-color: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateX(-50%) scale(1.05);
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Main content styles - hidden initially */
        #main-content {
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        #main-content.show {
            opacity: 1;
        }

        .content-container {
            padding: 20px;
            text-align: center;
        }
        
        .section {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 40px 20px;
            margin: 20px auto;
            max-width: 800px;
            border-radius: 8px;
        }
        
        .logo {
            max-width: 150px;
            margin-bottom: 20px;
        }
        
        h1, h2 {
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>

    <!-- Main background video (for main content) -->
    <video autoplay loop muted playsinline id="background-video">
        <source src="Affirmation_Sign_Video_Generation.mp4" type="video/mp4">
    </video>

    <!-- Splash Screen with Video -->
    <div id="splash-screen">
        <!-- Video as splash screen background -->
        <video autoplay muted playsinline id="splash-video">
            <source src="Affirmation_Sign_Video_Generation.mp4" type="video/mp4">
        </video>
        
        <!-- Enter button that animates in after 2 seconds -->
        <div class="enter-prompt" id="enter-prompt">Press Enter to Continue</div>
    </div>

    <!-- Main content - initially hidden -->
    <main id="main-content">
        <div class="content-container">
            <div class="section">
                <img src="logo.png" alt="The Vibe Check Project Logo" class="logo">
                <h1>The Vibe Check Project</h1>
                <p>Your one-line slogan or mission statement goes here.</p>
            </div>
            <div class="section">
                <h2>About Us</h2>
                <p>This is where you can write a paragraph about your business.</p>
            </div>
            <div class="section">
                <h2>Contact Us</h2>
                <p>We'd love to hear from you! Please feel free to reach out.</p>
            </div>
        </div>
    </main>

    <!-- Script for splash screen and Tally popup trigger -->
    <script>
        let splashCompleted = false;

        // Function to handle splash screen transition and trigger Tally popup
        function completeSplashScreen() {
            if (splashCompleted) return;
            splashCompleted = true;

            const splashScreen = document.getElementById('splash-screen');
            const mainContent = document.getElementById('main-content');
            const body = document.body;

            // Hide splash screen and show main content
            splashScreen.classList.add('hidden');
            body.style.overflow = 'auto'; // Restore scrolling
            
            setTimeout(() => {
                mainContent.classList.add('show');
                splashScreen.style.display = 'none';
            }, 500);

            // Trigger the Tally popup after splash screen is hidden
            setTimeout(() => {
                triggerTallyPopup();
            }, 1000);
        }

        // Function to trigger the existing Tally popup
        function triggerTallyPopup() {
            // Wait for Tally to be loaded, then open the popup
            if (window.Tally) {
                window.Tally.openPopup('mR7JRj');
            } else {
                // Keep trying until Tally is loaded
                setTimeout(triggerTallyPopup, 100);
            }
        }

        // Listen for Enter key press on splash screen
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !splashCompleted) {
                event.preventDefault();
                completeSplashScreen();
            }
        });

        // Also allow clicking on the prompt
        document.getElementById('enter-prompt').addEventListener('click', function() {
            if (!splashCompleted) {
                completeSplashScreen();
            }
        });

        // Ensure splash video starts playing
        window.addEventListener('load', function() {
            const splashVideo = document.getElementById('splash-video');
            splashVideo.play().catch(e => console.log('Video autoplay prevented:', e));
        });
    </script>

    <!-- Your existing Tally configuration and script -->
    <script>
        window.TallyConfig = {
            "formId": "mR7JRj",
            "popup": {
                "emoji": {
                    "text": "👋",
                    "animation": "flash"
                },
                "autoClose": 2000,
                "showOnce": true,
                "doNotShowAfterSubmit": true
            }
        };
    </script>
    <script async src="https://tally.so/widgets/embed.js"></script>

</body>
</html>
