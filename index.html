<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Vibe Check Project</title>
    
    <script async src="https://tally.so/widgets/embed.js"></script>

    <style>
        /* Basic reset */
        body, html {
            height: 100%;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            background-color: #000;
            overflow: auto;
        }

        /* Video background style */
        #background-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            object-fit: cover; 
        }
        
        /* Splash screen styles */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; transition: opacity 0.5s ease-out;
        }
        #enter-button {
            position: absolute; bottom: 10%; left: 50%;
            transform: translateX(-50%); padding: 15px 30px; font-size: 1.2em;
            color: white; background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid white; border-radius: 50px; cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
            text-transform: uppercase; letter-spacing: 2px;
        }
        #enter-button:hover {
            background-color: rgba(255, 255, 255, 0.2); transform: scale(1.05);
        }

        /* Main content styles */
        #main-content {
            display: none; opacity: 0; transition: opacity 0.5s ease-in;
        }
        .visible {
            display: block !important; opacity: 1 !important;
        }
        .content-container { padding: 20px; text-align: center; }
        .section {
            background-color: rgba(0, 0, 0, 0.5); padding: 40px 20px;
            margin: 20px auto; max-width: 800px; border-radius: 8px;
        }
        .logo { max-width: 150px; margin-bottom: 20px; }
        h1, h2 { text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7); }

        /* --- NEW: Style for the popup button --- */
        .popup-button {
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
            background-color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
        }
        .popup-button:hover {
            background-color: #ccc;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <video autoplay loop muted playsinline id="background-video">
            <source src="Affirmation_Sign_Video_Generation.mp4" type="video/mp4">
        </video>
        <button id="enter-button">Enter</button>
    </div>

    <main id="main-content">
        <div class="content-container">
            <div class="section">
                <img src="logo.png" alt="The Vibe Check Project Logo" class="logo">
                <h1>The Vibe Check Project</h1>
                <p>Your one-line slogan or mission statement goes here.</p>
            </div>
            <div class="section">
                <h2>About Us</h2>
                <p>This is where you can write a paragraph about your business.</p>
            </div>
            
            <div class="section">
                <h2>Contact Us</h2>
                <p style="margin-bottom: 20px;">Have a question or want to vibe with us? Click the button below!</p>
                <button
                    class="popup-button"
                    data-tally-open="mR7JRj"
                    data-tally-layout="modal"
                    data-tally-width="700"
                    data-tally-hide-title="1"
                >
                    Open Contact Form
                </button>
            </div>
        </div>
    </main>

    <script>
        // (Your JavaScript is unchanged)
        const enterButton = document.getElementById('enter-button');
        const splashScreen = document.getElementById('splash-screen');
        const mainContent = document.getElementById('main-content');
        enterButton.addEventListener('click', () => {
            splashScreen.style.opacity = '0';
            setTimeout(() => {
                splashScreen.style.display = 'none';
                mainContent.classList.add('visible');
            }, 500);
        });
    </script>

</body>
</html>
