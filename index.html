<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Vibe Check Project</title>
    <style>
        /* Basic reset */
        body, html {
            height: 100%;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            background-color: #000;
            overflow: auto;
        }

        /* Video background style */
        #background-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            object-fit: cover; 
        }

        /* Main content styles (now visible by default) */
        #main-content {
            opacity: 1;
        }

        .content-container {
            padding: 20px;
            text-align: center;
        }
        .section {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 40px 20px;
            margin: 20px auto;
            max-width: 800px;
            border-radius: 8px;
        }
        .logo {
            max-width: 150px;
            margin-bottom: 20px;
        }
        h1, h2 {
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="background-video">
        <source src="Affirmation_Sign_Video_Generation.mp4" type="video/mp4">
    </video>

    <!-- The splash screen has been removed. The main content is now visible on load. -->
    <main id="main-content">
        <div class="content-container">
            <div class="section">
                <img src="logo.png" alt="The Vibe Check Project Logo" class="logo">
                <h1>The Vibe Check Project</h1>
                <p>Your one-line slogan or mission statement goes here.</p>
            </div>
            <div class="section">
                <h2>About Us</h2>
                <p>This is where you can write a paragraph about your business.</p>
            </div>
            <div class="section">
                <h2>Contact Us</h2>
                <p>We'd love to hear from you! Please feel free to reach out.</p>
            </div>
        </div>
    </main>

    <!-- This is your script that makes the popup appear automatically -->
    <script>
      window.TallyConfig = {
        "formId": "mR7JRj",
        "popup": {
          "emoji": {
            "text": "👋",
            "animation": "flash"
          },
          "autoClose": 2000,
          "showOnce": true,
          "doNotShowAfterSubmit": true
        }
      };
    </script>
    <script async src="https://tally.so/widgets/embed.js"></script>

</body>
</html>
