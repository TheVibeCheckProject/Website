<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Vibe Check Project</title>
    <style>
        /* Basic reset */
        body, html {
            height: 100%;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            background-color: #000;
            overflow: auto;
        }

        /* The video background */
        #background-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
        }
        
        /* --- SPLASH SCREEN STYLES (Unchanged) --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; transition: opacity 0.5s ease-out;
        }
        #enter-button {
            position: absolute; bottom: 10%; left: 50%;
            transform: translateX(-50%); padding: 15px 30px; font-size: 1.2em;
            color: white; background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid white; border-radius: 50px; cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
            text-transform: uppercase; letter-spacing: 2px;
        }
        #enter-button:hover {
            background-color: rgba(255, 255, 255, 0.2); transform: scale(1.05);
        }

        /* --- MAIN CONTENT STYLES (Unchanged) --- */
        #main-content {
            display: none; opacity: 0; transition: opacity 0.5s ease-in;
        }
        .visible {
            display: block !important; opacity: 1 !important;
        }
        .content-container { padding: 20px; text-align: center; }
        .section {
            background-color: rgba(0, 0, 0, 0.5); padding: 40px 20px;
            margin: 20px auto; max-width: 800px; border-radius: 8px;
        }
        .logo { max-width: 150px; margin-bottom: 20px; }
        h1, h2 { text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7); }

        /* --- STYLES FOR THE CONTACT FORM --- */
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Adds space between form elements */
            text-align: left;
        }
        .contact-form label {
            font-weight: bold;
        }
        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #555;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1em;
            box-sizing: border-box; /* Important for padding */
        }
        .contact-form button {
            padding: 12px;
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
            background-color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .contact-form button:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <video autoplay loop muted playsinline id="background-video">
            <source src="Affirmation_Sign_Video_Generation.mp4" type="video/mp4">
        </video>
        <button id="enter-button">Enter</button>
    </div>

    <main id="main-content">
        <div class="content-container">
            <div class="section">
                <img src="logo.png" alt="The Vibe Check Project Logo" class="logo">
                <h1>The Vibe Check Project</h1>
                <p>Your one-line slogan or mission statement goes here.</p>
            </div>
            <div class="section">
                <h2>About Us</h2>
                <p>This is where you can write a paragraph about your business. Explain what you do, who you are, and what makes your project unique.</p>
            </div>
            
            <div class="section">
                <h2>Contact Us</h2>
                <form action="https://formspree.io/f/mwprawvj" method="POST" class="contact-form">
                    <label>Your Name:</label>
                    <input type="text" name="name" required>
                    
                    <label>Your Email:</label>
                    <input type="email" name="_replyto" required>
                    
                    <label>Your Message:</label>
                    <textarea name="message" rows="6" required></textarea>
                    
                    <button type="submit">Send Message</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        // (Your JavaScript is unchanged)
        const enterButton = document.getElementById('enter-button');
        const splashScreen = document.getElementById('splash-screen');
        const mainContent = document.getElementById('main-content');
        enterButton.addEventListener('click', () => {
            splashScreen.style.opacity = '0';
            setTimeout(() => {
                splashScreen.style.display = 'none';
                mainContent.classList.add('visible');
            }, 500);
        });
    </script>

</body>
</html>
